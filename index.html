<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship</title>
    <link rel="stylesheet" href="609a232ab53e413e38d2.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script defer src="main.js"></script></head>
  <body>
    <div class="top-bar">
      <a class="github-btn" href="https://github.com/yass-gr" target="_blank">
        <i class="fab fa-github"></i>
        <span>yass-gr</span>
      </a>
      <button class="theme-toggle" id="theme-toggle">Light Mode</button>
    </div>
    
    <h1>Battleship</h1>
    <div class="status" id="status"></div>
    
    <div class="panel" id="mode-select">
      <h3>Select Game Mode</h3>
      <div class="mode-buttons">
        <button class="btn" id="vs-computer-btn">vs Computer</button>
        <button class="btn" id="vs-player-btn">vs Player</button>
      </div>
    </div>
    
    <div class="pass-screen" id="pass-screen" style="display: none;">
      <h2 id="pass-message">Player 1's Board</h2>
      <p>Pass the device to the other player</p>
      <button class="btn" id="ready-btn">I'm Ready!</button>
    </div>
    
    <div class="panel" id="placement-panel" style="display: none;">
      <div class="placement-header">
        <h3 id="placement-title">Place Your Ships</h3>
        <p class="hint">Drag ships to board or click to place</p>
      </div>
      <div class="ship-dock" id="ship-dock"></div>
      <div class="placement-area">
        <div class="board-section">
          <h2 id="board-label">Your Board</h2>
          <div class="board" id="player-board"></div>
        </div>
      </div>
      <div class="placement-actions">
        <button class="btn btn-secondary" id="random-btn">Random</button>
        <button class="btn" id="done-btn" style="display: none;">Done</button>
      </div>
    </div>
    
    <div class="game-container" id="game-container" style="display: none;">
      <div class="board-section">
        <h2 id="player-label">Your Ships</h2>
        <div class="board" id="player-board-game"></div>
      </div>
      <div class="board-section">
        <h2 id="enemy-label">Enemy Waters</h2>
        <div class="board" id="enemy-board"></div>
      </div>
    </div>
    <button class="btn" id="reset-btn">New Game</button>
    <script type="module" src="c95c2d6843cce8a81cd1.js"></script>
  </body>
</html>
